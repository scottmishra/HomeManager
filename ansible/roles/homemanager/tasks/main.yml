---
- name: Template .env.production
  template:
    src: env.production.j2
    dest: "{{ deploy_dir }}/.env.production"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Build and start containers
  shell: |
    docker compose up -d --build
  args:
    chdir: "{{ deploy_dir }}"
  become_user: "{{ ansible_user }}"
  environment:
    VITE_SUPABASE_URL: "{{ supabase_url }}"
    VITE_SUPABASE_ANON_KEY: "{{ supabase_anon_key }}"

- name: Wait for health check
  uri:
    url: "http://localhost:{{ app_port }}/api/health"
    return_content: yes
    status_code: 200
  register: health
  until: health.status is defined and health.status == 200
  retries: 30
  delay: 5
  when: not ansible_check_mode

- name: Check if Teleport is installed
  stat:
    path: /etc/teleport.yaml
  register: teleport_config

- name: Add app_service to Teleport config
  blockinfile:
    path: /etc/teleport.yaml
    marker: "# {mark} ANSIBLE MANAGED - homemanager app"
    block: |
      app_service:
        enabled: yes
        apps:
          - name: "{{ app_name }}"
            uri: "http://localhost:{{ app_port }}"
            labels:
              env: "{{ app_env }}"
  when: teleport_config.stat.exists
  register: app_block
  notify: restart teleport

# The agent's original join token only covered the Node role and has likely
# expired. When the app_service block is added, Teleport needs to re-join
# with a token authorised for both node and app roles. deploy.sh fetches a
# fresh token from the hub and passes it in as `teleport_token`.
- name: Update Teleport join token
  replace:
    path: /etc/teleport.yaml
    regexp: '^(\s*token_name:\s*).*$'
    replace: '\g<1>{{ teleport_token }}'
  when:
    - teleport_config.stat.exists
    - teleport_token is defined
    - teleport_token | length > 0
  register: token_update
  notify: restart teleport

# Clearing host_uuid forces Teleport to re-register on next start,
# picking up the new role set (node + app) via the fresh token.
- name: Clear stale Teleport host identity so it re-joins with new roles
  file:
    path: /var/lib/teleport/host_uuid
    state: absent
  when:
    - teleport_config.stat.exists
    - token_update is defined
    - token_update.changed or app_block.changed
  notify: restart teleport

- name: Print access URL
  debug:
    msg: "HomeManager is available at https://{{ app_domain }}"
